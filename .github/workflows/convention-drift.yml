name: Convention Drift Check

# Drift detection scope policy (set 2026-05-16):
# - Monitored: 3 git-hosted markdown reference impls (via hashUrl raw URLs) +
#   4 HTML guidance pages (agents.md, linuxfoundation, OSAID, CNCF).
# - KILL CRITERION: If runs on 2026-05-18 AND 2026-05-25 both flag the HTML
#   guidance pages (agents.md, LF, OSAID, CNCF) as drifted, descope this cron
#   to git-hosted markdown only and migrate HTML monitoring to a quarterly
#   maintainer checklist (Fork C). See issue #23 thread for rationale.

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore hash cache
        uses: actions/cache@v5
        with:
          path: .convention-hashes
          key: convention-hashes-v2-${{ github.run_id }}
          restore-keys: convention-hashes-v2-
          save-always: true

      - name: Check for drift
        id: drift
        run: |
          mkdir -p .convention-hashes

          body_file=$(mktemp)
          found_drift=false

          printf "Convention source content has changed since last check.\n\n" > "$body_file"
          printf "| Source | URL |\n|--------|-----|\n" >> "$body_file"

          jq -r '.sources[] | select(.monitor != false) | "\(.name)|\(.hashUrl // .url)"' public/conventions.json | while IFS='|' read -r name url; do
            slug=$(printf '%s' "$name" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
            hash_file=".convention-hashes/${slug}.sha256"

            new_hash=$(curl -sfL --max-time 30 "$url" | shasum -a 256 | cut -d' ' -f1)

            if [ -z "$new_hash" ]; then
              echo "::warning::Failed to fetch: $name ($url)"
              continue
            fi

            if [ -f "$hash_file" ]; then
              old_hash=$(cat "$hash_file")
              if [ "$old_hash" != "$new_hash" ]; then
                echo "Drift detected: $name"
                printf "| %s | %s |\n" "$name" "$url" >> "$body_file"
                echo "true" > /tmp/drift_flag
              fi
            else
              echo "First run baseline: $name"
            fi

            printf '%s' "$new_hash" > "$hash_file"
          done

          if [ -f /tmp/drift_flag ]; then
            printf "\nRun \`/evolve\` to review and update templates.\n" >> "$body_file"
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "body_file=$body_file" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing drift issue
        id: existing
        if: steps.drift.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh issue list --label convention-drift --state open --json number --jq 'length')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Create issue
        if: steps.drift.outputs.drifted == 'true' && steps.existing.outputs.count == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Convention drift detected" \
            --body-file "${{ steps.drift.outputs.body_file }}" \
            --label "convention-drift"
