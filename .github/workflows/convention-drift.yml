name: Convention Drift Check

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore hash cache
        uses: actions/cache@v4
        with:
          path: .convention-hashes
          key: convention-hashes-${{ github.run_id }}
          restore-keys: convention-hashes-

      - name: Check for drift
        id: drift
        run: |
          mkdir -p .convention-hashes

          body_file=$(mktemp)
          found_drift=false

          printf "Convention source content has changed since last check.\n\n" > "$body_file"
          printf "| Source | URL |\n|--------|-----|\n" >> "$body_file"

          jq -r '.sources[] | "\(.name)|\(.url)"' public/conventions.json | while IFS='|' read -r name url; do
            slug=$(printf '%s' "$name" | tr ' ' '-' | tr '[:upper:]' '[:lower:]')
            hash_file=".convention-hashes/${slug}.sha256"

            new_hash=$(curl -sfL --max-time 30 "$url" | shasum -a 256 | cut -d' ' -f1)

            if [ -z "$new_hash" ]; then
              echo "::warning::Failed to fetch: $name ($url)"
              continue
            fi

            if [ -f "$hash_file" ]; then
              old_hash=$(cat "$hash_file")
              if [ "$old_hash" != "$new_hash" ]; then
                echo "Drift detected: $name"
                printf "| %s | %s |\n" "$name" "$url" >> "$body_file"
                echo "true" > /tmp/drift_flag
              fi
            else
              echo "First run baseline: $name"
            fi

            printf '%s' "$new_hash" > "$hash_file"
          done

          if [ -f /tmp/drift_flag ]; then
            printf "\nRun \`/evolve\` to review and update templates.\n" >> "$body_file"
            echo "drifted=true" >> "$GITHUB_OUTPUT"
            echo "body_file=$body_file" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue
        if: steps.drift.outputs.drifted == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Convention drift detected" \
            --body-file "${{ steps.drift.outputs.body_file }}" \
            --label "convention-drift"
