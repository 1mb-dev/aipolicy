name: Deploy to GitHub Pages

on:
  push:
    tags: ["v*"]

jobs:
  ci:
    uses: 1mb-dev/.github/.github/workflows/ci-node.yml@main
    with:
      node-versions: '["22"]'
      run-build: false
      run-audit: false

  deploy:
    needs: ci
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public
          # Required since v1.3.0 introduces presets/<p>/.github/ and
          # .cursor/rules/ directories (leading-dot dirs). v5 defaults this
          # to false, which silently drops hidden files from the artifact.
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
